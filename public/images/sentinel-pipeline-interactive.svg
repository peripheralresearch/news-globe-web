<svg width="1400" height="700" viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>

    <!-- Animated flow effect -->
    <linearGradient id="flowGradient">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0" />
      <animate attributeName="x1" values="-100%;200%" dur="2s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%;300%" dur="2s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="700" fill="#FEFCE8"/>

  <!-- Title -->
  <text x="700" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#1F2937">
    Sentinel Intelligence Pipeline
  </text>
  <text x="700" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle" fill="#78716C">
    AI-Powered OSINT Collection & Enrichment
  </text>

  <!-- INPUT SOURCES SECTION -->

  <!-- Telegram -->
  <g class="source-node">
    <circle cx="120" cy="180" r="45" fill="url(#yellowGradient)" filter="url(#shadow)"/>
    <circle cx="120" cy="180" r="35" fill="white"/>
    <text x="120" y="185" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle" fill="#1F2937">📱</text>
    <text x="120" y="240" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle" fill="#1F2937">Telegram</text>
    <text x="120" y="258" font-family="system-ui" font-size="11" text-anchor="middle" fill="#78716C">Real-time</text>
  </g>

  <!-- RSS Feeds -->
  <g class="source-node">
    <circle cx="120" cy="320" r="45" fill="url(#yellowGradient)" filter="url(#shadow)"/>
    <circle cx="120" cy="320" r="35" fill="white"/>
    <text x="120" y="325" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle" fill="#1F2937">📡</text>
    <text x="120" y="380" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle" fill="#1F2937">RSS Feeds</text>
    <text x="120" y="398" font-family="system-ui" font-size="11" text-anchor="middle" fill="#78716C">1000+ sources</text>
  </g>

  <!-- Reddit (planned) -->
  <g class="source-node" opacity="0.5">
    <circle cx="120" cy="460" r="45" fill="#E5E7EB" filter="url(#shadow)"/>
    <circle cx="120" cy="460" r="35" fill="white"/>
    <text x="120" y="465" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle" fill="#9CA3AF">🔴</text>
    <text x="120" y="520" font-family="system-ui" font-size="13" font-weight="500" text-anchor="middle" fill="#9CA3AF">Reddit</text>
    <text x="120" y="538" font-family="system-ui" font-size="11" text-anchor="middle" fill="#9CA3AF">Planned</text>
  </g>

  <!-- X/Twitter (planned) -->
  <g class="source-node" opacity="0.5">
    <circle cx="120" cy="600" r="45" fill="#E5E7EB" filter="url(#shadow)"/>
    <circle cx="120" cy="600" r="35" fill="white"/>
    <text x="120" y="605" font-family="system-ui" font-size="14" font-weight="600" text-anchor="middle" fill="#9CA3AF">𝕏</text>
    <text x="120" y="660" font-family="system-ui" font-size="13" font-weight="500" text-anchor="middle" fill="#9CA3AF">X (Twitter)</text>
    <text x="120" y="678" font-family="system-ui" font-size="11" text-anchor="middle" fill="#9CA3AF">Planned</text>
  </g>

  <!-- Flow lines from sources to ingestion -->
  <path d="M 165 180 Q 250 180 280 250" stroke="#F59E0B" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M 165 320 Q 250 320 280 300" stroke="#F59E0B" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M 165 460 Q 250 460 280 350" stroke="#D1D5DB" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="5,5"/>
  <path d="M 165 600 Q 250 600 280 400" stroke="#D1D5DB" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- Animated flow dots -->
  <circle r="4" fill="#F59E0B" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 165 180 Q 250 180 280 250"/>
  </circle>
  <circle r="4" fill="#F59E0B" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.5s" path="M 165 320 Q 250 320 280 300"/>
  </circle>

  <!-- INGESTION HUB -->
  <g class="ingestion-hub">
    <circle cx="320" cy="300" r="60" fill="url(#darkGradient)" filter="url(#shadow)"/>
    <text x="320" y="295" font-family="system-ui" font-size="28" text-anchor="middle" fill="#FCD34D">⚡</text>
    <text x="320" y="320" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle" fill="white">INGESTION</text>
    <circle cx="320" cy="300" r="65" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.3">
      <animate attributeName="r" values="65;75;65" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- PROCESSING CORE -->
  <rect x="480" y="140" width="520" height="420" rx="20" fill="url(#yellowGradient)" filter="url(#shadow)"/>
  <rect x="490" y="150" width="500" height="400" rx="15" fill="#FFFBEB"/>

  <!-- Core Title -->
  <text x="740" y="190" font-family="system-ui" font-size="24" font-weight="700" text-anchor="middle" fill="#1F2937">Sentinel Core</text>
  <text x="740" y="210" font-family="system-ui" font-size="12" text-anchor="middle" fill="#78716C">AI-Powered Enrichment Engine</text>

  <!-- Processing modules in grid -->

  <!-- Geolocation Module -->
  <g class="module">
    <rect x="510" y="240" width="220" height="110" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="540" cy="270" r="18" fill="#FCD34D"/>
    <text x="540" y="276" font-family="system-ui" font-size="16" text-anchor="middle">🌍</text>
    <text x="570" y="275" font-family="system-ui" font-size="14" font-weight="600" fill="#1F2937">Geolocation</text>
    <text x="520" y="300" font-family="system-ui" font-size="11" fill="#78716C">• Extract coordinates</text>
    <text x="520" y="318" font-family="system-ui" font-size="11" fill="#78716C">• Map locations</text>
    <text x="520" y="336" font-family="system-ui" font-size="11" fill="#78716C">• Region tagging</text>
  </g>

  <!-- Sentiment Analysis Module -->
  <g class="module">
    <rect x="750" y="240" width="220" height="110" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="780" cy="270" r="18" fill="#FCD34D"/>
    <text x="780" y="276" font-family="system-ui" font-size="16" text-anchor="middle">😊</text>
    <text x="810" y="275" font-family="system-ui" font-size="14" font-weight="600" fill="#1F2937">Sentiment Analysis</text>
    <text x="760" y="300" font-family="system-ui" font-size="11" fill="#78716C">• Positive/Negative</text>
    <text x="760" y="318" font-family="system-ui" font-size="11" fill="#78716C">• Emotion detection</text>
    <text x="760" y="336" font-family="system-ui" font-size="11" fill="#78716C">• Tone analysis</text>
  </g>

  <!-- Smart Indexing Module -->
  <g class="module">
    <rect x="510" y="370" width="220" height="110" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="540" cy="400" r="18" fill="#FCD34D"/>
    <text x="540" y="406" font-family="system-ui" font-size="16" text-anchor="middle">🕐</text>
    <text x="570" y="405" font-family="system-ui" font-size="14" font-weight="600" fill="#1F2937">Smart Indexing</text>
    <text x="520" y="430" font-family="system-ui" font-size="11" fill="#78716C">• Story clustering</text>
    <text x="520" y="448" font-family="system-ui" font-size="11" fill="#78716C">• BGE-M3 embeddings</text>
    <text x="520" y="466" font-family="system-ui" font-size="11" fill="#78716C">• Auto-grouping</text>
  </g>

  <!-- Entity Extraction Module -->
  <g class="module">
    <rect x="750" y="370" width="220" height="110" rx="12" fill="white" filter="url(#shadow)"/>
    <circle cx="780" cy="400" r="18" fill="#FCD34D"/>
    <text x="780" y="406" font-family="system-ui" font-size="16" text-anchor="middle">👤</text>
    <text x="810" y="405" font-family="system-ui" font-size="14" font-weight="600" fill="#1F2937">Entity Extraction</text>
    <text x="760" y="430" font-family="system-ui" font-size="11" fill="#78716C">• Persons</text>
    <text x="760" y="448" font-family="system-ui" font-size="11" fill="#78716C">• Organizations</text>
    <text x="760" y="466" font-family="system-ui" font-size="11" fill="#78716C">• Locations</text>
  </g>

  <!-- Flow from ingestion to core -->
  <path d="M 380 300 L 480 300" stroke="#F59E0B" stroke-width="4" fill="none"/>
  <polygon points="480,300 465,295 465,305" fill="#F59E0B"/>

  <!-- Animated flow dot -->
  <circle r="5" fill="#F59E0B" filter="url(#glow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 380 300 L 480 300"/>
  </circle>

  <!-- OUTPUT SECTION -->

  <!-- Flow from core to output -->
  <path d="M 1000 300 L 1100 300" stroke="#F59E0B" stroke-width="4" fill="none"/>
  <polygon points="1100,300 1085,295 1085,305" fill="#F59E0B"/>

  <!-- Animated flow dot -->
  <circle r="5" fill="#F59E0B" filter="url(#glow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.3s" path="M 1000 300 L 1100 300"/>
  </circle>

  <!-- Output Hub -->
  <g class="output-hub">
    <circle cx="1230" cy="300" r="90" fill="url(#yellowGradient)" filter="url(#shadow)"/>
    <circle cx="1230" cy="300" r="75" fill="white"/>
    <text x="1230" y="290" font-family="system-ui" font-size="32" text-anchor="middle">🤖</text>
    <text x="1230" y="315" font-family="system-ui" font-size="14" font-weight="700" text-anchor="middle" fill="#1F2937">Peripheral Bot</text>
    <text x="1230" y="335" font-family="system-ui" font-size="11" text-anchor="middle" fill="#78716C">Intelligence Output</text>
  </g>

  <!-- Stats boxes -->
  <g class="stat-box">
    <rect x="1050" y="450" width="150" height="70" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="1125" y="475" font-family="system-ui" font-size="20" font-weight="700" text-anchor="middle" fill="#F59E0B">30K+</text>
    <text x="1125" y="495" font-family="system-ui" font-size="11" text-anchor="middle" fill="#78716C">Stories Tracked</text>
  </g>

  <g class="stat-box">
    <rect x="1220" y="450" width="150" height="70" rx="10" fill="white" filter="url(#shadow)"/>
    <text x="1295" y="475" font-family="system-ui" font-size="20" font-weight="700" text-anchor="middle" fill="#F59E0B">15 min</text>
    <text x="1295" y="495" font-family="system-ui" font-size="11" text-anchor="middle" fill="#78716C">Update Cycle</text>
  </g>

  <!-- Processing indicator -->
  <g class="processing-indicator">
    <circle cx="740" cy="520" r="3" fill="#F59E0B">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="755" cy="520" r="3" fill="#F59E0B">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="770" cy="520" r="3" fill="#F59E0B">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="740" y="545" font-family="system-ui" font-size="10" text-anchor="middle" fill="#78716C">Processing</text>
  </g>
</svg>
