name: WebApp CI

on:
  pull_request:
    branches: [main, develop, staging]
  push:
    branches: [main, develop, staging]
  workflow_dispatch:

concurrency:
  group: webapp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for merge conflict markers
        run: npm run check:merge-markers

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
